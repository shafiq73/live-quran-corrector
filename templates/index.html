<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <title>Live Quranic Correction</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; padding-top: 50px; }
        .main-container { max-width: 600px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0px 4px 15px rgba(0,0,0,0.1); }
        .status-box { margin-top: 20px; font-size: 1.2rem; font-weight: bold; }
    </style>
</head>
<body>

<div class="main-container">
    <h2 class="text-success mb-4">📖 Live Quranic Word-Correction</h2>
    <p class="text-muted">Aap bina rokay live parhte jaen, galti par Qari Sahab auto-start ho jaenge.</p>
    
    <div class="alert alert-info">📖 Target: <b>الحمد لله رب العالمين</b></div>
    
    <button id="startBtn" class="btn btn-danger btn-lg rounded-pill px-4">🎙️ Live Parhna Shuru Karein</button>
    
    <div class="status-box id-status text-secondary" id="liveText">🗣️ Aap jo bolenge yahan likha aayega...</div>
    
    <div class="mt-4">
        <h5>🎵 Qari Raad Al Kurdi Audio</h5>
        <audio id="qariAudio" src="https://server6.mp3quran.net/kurdi/001.mp3" controls></audio>
    </div>
</div>

<script>
    let mediaRecorder;
    let ws;
    const startBtn = document.getElementById('startBtn');
    const liveText = document.getElementById('liveText');
    const qariAudio = document.getElementById('qariAudio');

    startBtn.onclick = async () => {
        startBtn.disabled = true;
        startBtn.innerText = "🔴 Live Listening Active...";
        
        // WebSocket pipe connect karna server ke sath
        ws = new WebSocket(`ws://${window.location.host}/ws/stream`);
        
        ws.onmessage = (event) => {
            let data = JSON.parse(event.data);
            liveText.innerText = "Aap ne parha: " + data.user_text;
            
            if (data.status === "error") {
                liveText.className = "status-box text-danger";
                // 🔄 Galti hote hi Qari sahab ko exact second par chala dena
                qariAudio.currentTime = data.jump_to;
                qariAudio.play();
            } else if (data.status === "success") {
                liveText.className = "status-box text-success";
                // ✅ Sahi parhne par Qari sahab ko automatic chup (pause) kar dena
                qariAudio.pause();
            }
        };

        // Browser ka Microphone access karna
        let stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm' });
        
        // Har 1 second (1000ms) ke baad audio chunk automatic bhejna
        mediaRecorder.ondataavailable = async (e) => {
            if (e.data.size > 0 && ws.readyState === WebSocket.OPEN) {
                ws.send(e.data);
            }
        };
        
        mediaRecorder.start(1000); // Trigger every 1 second
    };
</script>

</body>
</html>
